name: Full CI/CD with EC2 Creation

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Docker login
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build & Push
    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-node-app .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/my-node-app

    # Configure AWS
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1   

    # Launch EC2 + Deploy
    - name: Launch EC2 and Deploy
      run: |
        INSTANCE_ID=$(aws ec2 run-instances \
          --image-id ami-0f5ee92e2d63afc18 \
          --count 1 \
          --instance-type t2.micro \
          --security-groups default \
          --user-data '#!/bin/bash
          apt update -y
          apt install docker.io -y
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-node-app
          docker run -d -p 80:3000 ${{ secrets.DOCKER_USERNAME }}/my-node-app' \
          --query 'Instances[0].InstanceId' \
          --output text)

        echo "Instance ID: $INSTANCE_ID"

        aws ec2 wait instance-running --instance-ids $INSTANCE_ID

        PUBLIC_IP=$(aws ec2 describe-instances \
          --instance-ids $INSTANCE_ID \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text)

        echo "App deployed at http://$PUBLIC_IP"